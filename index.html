    <script>
        // Fix for "Uncaught TypeError: Cannot set property fetch of #<Window> which has only a getter"
        // This must run BEFORE any other scripts that might try to polyfill fetch
        (function() {
            try {
                var descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
                if (descriptor && !descriptor.writable && !descriptor.set && descriptor.configurable) {
                    var originalFetch = window.fetch;
                    Object.defineProperty(window, 'fetch', {
                        value: originalFetch,
                        writable: true,
                        configurable: true,
                        enumerable: true
                    });
                }
            } catch (e) {
                // If we can't redefine it, we at least tried. 
                // Some environments make fetch non-configurable.
            }
        })();
    </script>
